name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go / verify-mock + test-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout proto-commons@test-corpus (mock corpus)
        uses: actions/checkout@v4
        with:
          repository: Skund404/proto-commons
          ref: test-corpus
          path: .cache/proto-commons

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: go.sum

      - name: Export mock path
        run: echo "COMMONS_MOCK_PATH=$(pwd)/.cache/proto-commons" >> $GITHUB_ENV

      - name: go vet
        run: go vet ./...

      - name: make verify-mock
        run: make verify-mock MOCK_PATH="$COMMONS_MOCK_PATH"

      - name: make test-go (with -race)
        run: go test ./... -count=1 -race
        env:
          COMMONS_MOCK_PATH: ${{ github.workspace }}/.cache/proto-commons

  frontend:
    name: frontend / lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm run build

  build:
    name: build / cross-compile Linux + Windows
    runs-on: ubuntu-latest
    needs: [go, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build
      - run: make build-linux
      - run: make build-windows
      - uses: actions/upload-artifact@v4
        with:
          name: commons-binaries
          path: |
            dist/commons-linux-amd64
            dist/commons-windows-amd64.exe
          if-no-files-found: error
          retention-days: 14

  e2e:
    name: e2e / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [go, frontend]
    # Make gh CLI work inside the running commons binary so /api/prs doesn't
    # spawn auth-failing subprocesses for every request. Standard Actions
    # pattern — the runner's GITHUB_TOKEN gives gh read access to PRs on this
    # repo. Without this the server still works (fixture PRs are returned)
    # but throughput collapses under the subprocess flood.
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    # Use bash on every platform — Makefile recipes assume POSIX tools
    # (find, cp -r, etc.) which are available on Windows runners via Git Bash.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Checkout proto-commons@test-corpus
        uses: actions/checkout@v4
        with:
          repository: Skund404/proto-commons
          ref: test-corpus
          path: .cache/proto-commons

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Export mock path
        run: echo "COMMONS_MOCK_PATH=$(pwd)/.cache/proto-commons" >> $GITHUB_ENV

      - name: make build
        run: make build

      - name: Install Playwright (chromium-headless-shell)
        run: make install-pw

      - name: make e2e
        run: make e2e MOCK_PATH="$COMMONS_MOCK_PATH"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: frontend/playwright-report
          retention-days: 7
